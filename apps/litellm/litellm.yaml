apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai
data:
  config.yaml: |
    model_list:
      - model_name: "llama3.2"
        litellm_params:
          model: "ollama/llama3.2"
          api_base: "http://10.0.30.237:11434"
      - model_name: "llama3.1"
        litellm_params:
          model: "ollama/llama3.1:8b"
          api_base: "http://10.0.30.237:11434"
      - model_name: "dolphin"
        litellm_params:
          model: "ollama/dolphin-mistral"
          api_base: "http://10.0.30.237:11434"
      - model_name: "dolphin-llama3"
        litellm_params:
          model: "ollama/dolphin-llama3:8b"
          api_base: "http://10.0.30.237:11434"
      - model_name: "claude-sonnet"
        litellm_params:
          model: "claude-sonnet-4-20250514"
          api_key: "os.environ/ANTHROPIC_API_KEY"
    general_settings:
      master_key: "sk-litellm-master-key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
      - name: litellm
        image: ghcr.io/berriai/litellm:main-latest
        ports:
        - containerPort: 4000
        args: ["--config", "/etc/litellm/config.yaml"]
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-anthropic
              key: ANTHROPIC_API_KEY
        volumeMounts:
        - name: config
          mountPath: /etc/litellm
      volumes:
      - name: config
        configMap:
          name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: ai
spec:
  type: LoadBalancer
  loadBalancerIP: 10.0.10.68
  selector:
    app: litellm
  ports:
  - port: 4000
    targetPort: 4000
