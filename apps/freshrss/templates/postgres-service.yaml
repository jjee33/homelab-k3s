apiVersion: v1
kind: Service
metadata:
  name: freshrss-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "freshrss.labels" . | nindent 4 }}
    {{- include "postgres.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "postgres.selectorLabels" . | nindent 4 }}
