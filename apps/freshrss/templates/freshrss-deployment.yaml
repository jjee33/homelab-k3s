apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "freshrss.labels" . | nindent 4 }}
    {{- include "freshrss.selectorLabels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "freshrss.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "freshrss.selectorLabels" . | nindent 8 }}
    spec:
      # Wait for PostgreSQL to be ready before starting FreshRSS
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z freshrss-postgres.{{ .Values.namespace }}.svc.cluster.local 5432; do
                sleep 2
              done
              echo "PostgreSQL is ready."
      containers:
        - name: freshrss
          image: "{{ .Values.freshrss.image.repository }}:{{ .Values.freshrss.image.tag }}"
          imagePullPolicy: {{ .Values.freshrss.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.timezone }}
            - name: CRON_MIN
              value: {{ .Values.freshrss.cronMin | quote }}
            # Auto-install on first run only — idempotent, skipped if already installed
            - name: FRESHRSS_INSTALL
              value: >-
                --default_user {{ .Values.freshrss.install.defaultUser }}
                --api_enabled
                --db-type pgsql
                --db-host freshrss-postgres.{{ .Values.namespace }}.svc.cluster.local
                --db-user {{ .Values.postgres.user }}
                --db-password {{ .Values.postgres.password }}
                --db-base {{ .Values.postgres.database }}
                --base_url {{ .Values.freshrss.install.baseUrl }}
                --language {{ .Values.freshrss.install.language }}
            - name: FRESHRSS_USER
              value: >-
                --user {{ .Values.freshrss.install.defaultUser }}
                --password {{ .Values.freshrss.install.defaultPassword }}
                --api_password {{ .Values.freshrss.install.defaultPassword }}
                --language {{ .Values.freshrss.install.language }}
          volumeMounts:
            - name: freshrss-data
              mountPath: /var/www/FreshRSS/data
            - name: freshrss-extensions
              mountPath: /var/www/FreshRSS/extensions
          resources:
            {{- toYaml .Values.freshrss.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /i/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /i/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: freshrss-data
          persistentVolumeClaim:
            claimName: freshrss-data
        - name: freshrss-extensions
          emptyDir: {}
