{{- if .Values.fulltextRss.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss-fulltext
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "freshrss.labels" . | nindent 4 }}
    {{- include "fulltext.selectorLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fulltext.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fulltext.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: fulltext-rss
          image: "{{ .Values.fulltextRss.image.repository }}:{{ .Values.fulltextRss.image.tag }}"
          imagePullPolicy: {{ .Values.fulltextRss.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.timezone }}
          resources:
            {{- toYaml .Values.fulltextRss.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: freshrss-fulltext
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "freshrss.labels" . | nindent 4 }}
    {{- include "fulltext.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "fulltext.selectorLabels" . | nindent 4 }}
{{- end }}
