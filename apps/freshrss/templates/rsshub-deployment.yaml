{{- if .Values.rsshub.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss-rsshub
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "freshrss.labels" . | nindent 4 }}
    {{- include "rsshub.selectorLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "rsshub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rsshub.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: rsshub
          image: "{{ .Values.rsshub.image.repository }}:{{ .Values.rsshub.image.tag }}"
          imagePullPolicy: {{ .Values.rsshub.image.pullPolicy }}
          ports:
            - containerPort: 1200
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.timezone }}
            - name: CACHE_EXPIRE
              value: {{ .Values.rsshub.cacheTtl | quote }}
            - name: ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: freshrss-rsshub
                  key: ACCESS_KEY
          resources:
            {{- toYaml .Values.rsshub.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: freshrss-rsshub
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "freshrss.labels" . | nindent 4 }}
    {{- include "rsshub.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 1200
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "rsshub.selectorLabels" . | nindent 4 }}
{{- end }}
